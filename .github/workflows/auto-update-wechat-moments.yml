name: Auto Update wechat-moments Formula

on:
  schedule:
    # Run every hour to check for new releases
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (optional, will auto-detect latest if not specified)"
        required: false
        type: string

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update wechat-moments formula
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            bin/update-wechat-moments.sh -v "${{ github.event.inputs.version }}"
          else
            bin/update-wechat-moments.sh
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        run: |
          bin/create-pr.sh -f wechat-moments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
